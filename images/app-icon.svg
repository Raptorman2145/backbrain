<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c0d0d"/>
      <stop offset="1" stop-color="#120505"/>
    </linearGradient>
    <linearGradient id="bbPad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5a5a"/>
      <stop offset="1" stop-color="#c62828"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background; controller kept inside the central ~80% so it
       survives a maskable (circular/rounded) crop on install. -->
  <rect width="512" height="512" fill="url(#bbBg)"/>
  <g>
    <!-- controller body -->
    <rect x="120" y="196" width="272" height="150" rx="72" fill="url(#bbPad)"/>
    <rect x="120" y="196" width="272" height="150" rx="72" fill="none" stroke="#ff8a8a" stroke-opacity="0.35" stroke-width="4"/>
    <!-- d-pad -->
    <rect x="150" y="260" width="72" height="22" rx="6" fill="#fff"/>
    <rect x="175" y="235" width="22" height="72" rx="6" fill="#fff"/>
    <!-- action buttons (diamond) -->
    <circle cx="330" cy="245" r="15" fill="#fff"/>
    <circle cx="365" cy="280" r="15" fill="#fff"/>
    <circle cx="330" cy="315" r="15" fill="#fff"/>
    <circle cx="295" cy="280" r="15" fill="#fff"/>
  </g>
</svg>
