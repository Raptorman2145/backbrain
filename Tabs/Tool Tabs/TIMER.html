<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../../code/CSS/shared.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
  body {
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px clamp(16px, 4vw, 48px);
    background: var(--bg);
    color: var(--text);
  }
  h1 { margin-bottom: 4px; }
  p.sub { color: var(--text-muted); margin: 0 0 20px; }

  .mode-tabs { display: flex; gap: 8px; margin-bottom: 22px; }
  .mode-tabs button {
    padding: 9px 18px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
  }
  .mode-tabs button.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent-bg); }

  .panel { max-width: 460px; }
  .panel[hidden] { display: none; }

  .phase-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent-bg);
    margin-bottom: 6px;
    min-height: 18px;
  }
  .time-display {
    font-size: 72px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 6px;
  }
  .cycle-label { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; min-height: 18px; }

  .timer-controls { display: flex; gap: 10px; margin-bottom: 24px; }
  .timer-controls button {
    padding: 12px 22px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 700;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
  }
  #pomoStartBtn, #stopwatchStartBtn { background: var(--accent-bg); color: var(--accent-text); }
  .timer-controls button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border-strong); }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    max-width: 420px;
    margin-bottom: 6px;
    padding: 14px;
    border-radius: var(--radius-md);
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .settings-grid label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .settings-grid input {
    width: 100%;
    box-sizing: border-box;
    padding: 7px 9px;
    font-size: 13px;
    font-family: inherit;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: var(--surface-alt);
    color: var(--text);
  }
  .settings-note { color: var(--text-muted); font-size: 11px; margin: 8px 0 24px; }

  #lapList { list-style: none; margin: 0; padding: 0; max-width: 300px; }
  #lapList li {
    display: flex;
    justify-content: space-between;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  #lapList li:first-child { color: var(--accent-bg); font-weight: 700; }
</style>
</head>
<body>
  <h1>Timer</h1>
  <p class="sub">Pomodoro focus cycles, or a plain stopwatch.</p>

  <div class="mode-tabs">
    <button type="button" id="pomoTabBtn" class="active">Pomodoro</button>
    <button type="button" id="stopwatchTabBtn">Stopwatch</button>
  </div>

  <div class="panel" id="pomoPanel">
    <div class="phase-label" id="pomoPhase">Work</div>
    <div class="time-display" id="pomoTime">25:00</div>
    <div class="cycle-label" id="pomoCycle">Cycle 1 of 4</div>
    <div class="timer-controls">
      <button type="button" id="pomoStartBtn">Start</button>
      <button type="button" id="pomoSkipBtn" class="secondary">Skip Phase</button>
      <button type="button" id="pomoResetBtn" class="secondary">Reset</button>
    </div>
    <div class="settings-grid">
      <div>
        <label for="workMin">Work (min)</label>
        <input type="number" id="workMin" min="1" max="180" value="25">
      </div>
      <div>
        <label for="shortBreakMin">Short break (min)</label>
        <input type="number" id="shortBreakMin" min="1" max="60" value="5">
      </div>
      <div>
        <label for="longBreakMin">Long break (min)</label>
        <input type="number" id="longBreakMin" min="1" max="120" value="15">
      </div>
      <div>
        <label for="cyclesUntilLong">Cycles until long break</label>
        <input type="number" id="cyclesUntilLong" min="1" max="12" value="4">
      </div>
    </div>
    <p class="settings-note">Changes apply the next time a phase starts fresh (won't cut a running phase short).</p>
  </div>

  <div class="panel" id="stopwatchPanel" hidden>
    <div class="time-display" id="stopwatchTime">00:00.0</div>
    <div class="timer-controls">
      <button type="button" id="stopwatchStartBtn">Start</button>
      <button type="button" id="stopwatchLapBtn" class="secondary" disabled>Lap</button>
      <button type="button" id="stopwatchResetBtn" class="secondary">Reset</button>
    </div>
    <ul id="lapList"></ul>
  </div>

  <script src="../../code/General%20Code/sidebar.js"></script>
  <script>
    // ================= Shared: audible + title-flash alert =================
    // A short synthesized beep (Web Audio API, no audio file to fetch) plus
    // flashing the tab title, so a phase change is noticeable even if this
    // tab isn't focused - the whole point of a work/break timer.
    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 880;
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } catch { /* Web Audio unsupported/blocked - silently skip the beep */ }
    }

    const originalTitle = document.title;
    let titleFlashTimer = null;
    function flashTitle(message) {
      clearInterval(titleFlashTimer);
      let on = true;
      titleFlashTimer = setInterval(() => {
        document.title = on ? message : originalTitle;
        on = !on;
      }, 900);
      setTimeout(() => { clearInterval(titleFlashTimer); document.title = originalTitle; }, 6000);
    }

    function alertPhaseChange(message) {
      beep();
      flashTitle(message);
      if (window.Notification && Notification.permission === "granted") {
        new Notification(message);
      }
    }
    if (window.Notification && Notification.permission === "default") {
      // Ask once, quietly - not asked again if they dismiss it.
      Notification.requestPermission();
    }

    function formatMMSS(totalSeconds) {
      const m = Math.floor(totalSeconds / 60);
      const s = Math.floor(totalSeconds % 60);
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    // ================= Mode tabs =================
    const pomoTabBtn = document.getElementById("pomoTabBtn");
    const stopwatchTabBtn = document.getElementById("stopwatchTabBtn");
    const pomoPanel = document.getElementById("pomoPanel");
    const stopwatchPanel = document.getElementById("stopwatchPanel");

    pomoTabBtn.addEventListener("click", () => {
      pomoTabBtn.classList.add("active");
      stopwatchTabBtn.classList.remove("active");
      pomoPanel.hidden = false;
      stopwatchPanel.hidden = true;
    });
    stopwatchTabBtn.addEventListener("click", () => {
      stopwatchTabBtn.classList.add("active");
      pomoTabBtn.classList.remove("active");
      stopwatchPanel.hidden = false;
      pomoPanel.hidden = true;
    });

    // ================= Pomodoro =================
    const pomoPhaseEl = document.getElementById("pomoPhase");
    const pomoTimeEl = document.getElementById("pomoTime");
    const pomoCycleEl = document.getElementById("pomoCycle");
    const pomoStartBtn = document.getElementById("pomoStartBtn");
    const pomoSkipBtn = document.getElementById("pomoSkipBtn");
    const pomoResetBtn = document.getElementById("pomoResetBtn");
    const workMinInput = document.getElementById("workMin");
    const shortBreakMinInput = document.getElementById("shortBreakMin");
    const longBreakMinInput = document.getElementById("longBreakMin");
    const cyclesUntilLongInput = document.getElementById("cyclesUntilLong");

    const PHASES = ["work", "short", "long"];
    const PHASE_LABELS = { work: "Work", short: "Short Break", long: "Long Break" };

    let pomoPhase = "work";
    let pomoCycle = 1;
    let pomoRemaining = Number(workMinInput.value) * 60;
    let pomoRunning = false;
    let pomoTicker = null;

    function phaseDurationSeconds(phase) {
      if (phase === "work") return Number(workMinInput.value) * 60;
      if (phase === "short") return Number(shortBreakMinInput.value) * 60;
      return Number(longBreakMinInput.value) * 60;
    }

    function renderPomo() {
      pomoPhaseEl.textContent = PHASE_LABELS[pomoPhase];
      pomoTimeEl.textContent = formatMMSS(pomoRemaining);
      const total = Math.max(1, Number(cyclesUntilLongInput.value));
      pomoCycleEl.textContent = pomoPhase === "work" ? `Cycle ${pomoCycle} of ${total}` : "";
      pomoStartBtn.textContent = pomoRunning ? "Pause" : "Start";
    }

    // True once Start has been clicked at least once during the current
    // phase. Settings only auto-apply to the live countdown while this is
    // false - comparing pomoRemaining against phaseDurationSeconds() to
    // infer "hasn't started yet" doesn't work, since that function reads
    // the input's live value, which has already changed by the time its
    // own "change" event fires.
    let pomoPhaseStarted = false;

    function advancePhase() {
      const cyclesTarget = Math.max(1, Number(cyclesUntilLongInput.value));
      if (pomoPhase === "work") {
        pomoPhase = pomoCycle >= cyclesTarget ? "long" : "short";
      } else {
        if (pomoPhase === "long") pomoCycle = 1; else pomoCycle++;
        pomoPhase = "work";
      }
      pomoRemaining = phaseDurationSeconds(pomoPhase);
      pomoPhaseStarted = false;
      alertPhaseChange(`${PHASE_LABELS[pomoPhase]} time!`);
      renderPomo();
    }

    function tickPomo() {
      pomoRemaining--;
      if (pomoRemaining <= 0) {
        advancePhase();
      } else {
        renderPomo();
      }
    }

    pomoStartBtn.addEventListener("click", () => {
      pomoRunning = !pomoRunning;
      if (pomoRunning) {
        pomoPhaseStarted = true;
        pomoTicker = setInterval(tickPomo, 1000);
      } else {
        clearInterval(pomoTicker);
      }
      renderPomo();
    });

    pomoSkipBtn.addEventListener("click", () => {
      advancePhase();
    });

    pomoResetBtn.addEventListener("click", () => {
      clearInterval(pomoTicker);
      pomoRunning = false;
      pomoPhase = "work";
      pomoCycle = 1;
      pomoRemaining = phaseDurationSeconds("work");
      pomoPhaseStarted = false;
      renderPomo();
    });

    [workMinInput, shortBreakMinInput, longBreakMinInput].forEach(input => {
      input.addEventListener("change", () => {
        // Only live-update the countdown if that exact phase hasn't started
        // ticking down yet this cycle (matches the on-page note: don't cut
        // a running phase short just because someone tweaked the minutes).
        const isCurrentPhaseInput =
          (input === workMinInput && pomoPhase === "work") ||
          (input === shortBreakMinInput && pomoPhase === "short") ||
          (input === longBreakMinInput && pomoPhase === "long");
        if (isCurrentPhaseInput && !pomoPhaseStarted) {
          pomoRemaining = phaseDurationSeconds(pomoPhase);
          renderPomo();
        }
      });
    });

    renderPomo();

    // ================= Stopwatch =================
    const stopwatchTimeEl = document.getElementById("stopwatchTime");
    const stopwatchStartBtn = document.getElementById("stopwatchStartBtn");
    const stopwatchLapBtn = document.getElementById("stopwatchLapBtn");
    const stopwatchResetBtn = document.getElementById("stopwatchResetBtn");
    const lapListEl = document.getElementById("lapList");

    let swElapsedMs = 0;
    let swStartedAt = null;
    let swRunning = false;
    let swTicker = null;
    let laps = [];

    function formatStopwatch(ms) {
      const totalTenths = Math.floor(ms / 100);
      const tenths = totalTenths % 10;
      const totalSeconds = Math.floor(ms / 1000);
      return `${formatMMSS(totalSeconds)}.${tenths}`;
    }

    function renderStopwatch() {
      const currentMs = swRunning ? swElapsedMs + (Date.now() - swStartedAt) : swElapsedMs;
      stopwatchTimeEl.textContent = formatStopwatch(currentMs);
    }

    function renderLaps() {
      lapListEl.innerHTML = laps.map((lap, i) => `
        <li><span>Lap ${laps.length - i}</span><span>${formatStopwatch(lap)}</span></li>
      `).join("");
    }

    stopwatchStartBtn.addEventListener("click", () => {
      swRunning = !swRunning;
      if (swRunning) {
        swStartedAt = Date.now();
        swTicker = setInterval(renderStopwatch, 100);
      } else {
        swElapsedMs += Date.now() - swStartedAt;
        clearInterval(swTicker);
      }
      stopwatchStartBtn.textContent = swRunning ? "Pause" : "Start";
      stopwatchLapBtn.disabled = !swRunning;
      renderStopwatch();
    });

    stopwatchLapBtn.addEventListener("click", () => {
      if (!swRunning) return;
      laps.unshift(swElapsedMs + (Date.now() - swStartedAt));
      renderLaps();
    });

    stopwatchResetBtn.addEventListener("click", () => {
      clearInterval(swTicker);
      swRunning = false;
      swElapsedMs = 0;
      swStartedAt = null;
      laps = [];
      stopwatchStartBtn.textContent = "Start";
      stopwatchLapBtn.disabled = true;
      renderLaps();
      renderStopwatch();
    });

    renderStopwatch();
  </script>
</body>
</html>
