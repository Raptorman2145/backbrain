<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emoji Picker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../../code/CSS/shared.css">
<link rel="stylesheet" href="../../code/CSS/tools.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
  body {
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px clamp(16px, 4vw, 48px);
    background: var(--bg);
    color: var(--text);
  }
  h1 { margin-bottom: 4px; }
  p.sub { color: var(--text-muted); margin: 0 0 24px; }

  .tool-input:focus-visible { outline: none; border-color: var(--accent-bg); box-shadow: var(--focus-ring); }
  button:focus-visible { outline: none; box-shadow: var(--focus-ring); }

  .picker-wrap { max-width: 780px; }

  #emojiSearch {
    width: 100%;
    padding: 11px 14px;
    font-size: 14px;
    background: var(--surface);
    margin-bottom: 14px;
  }

  .category-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
  .cat-tab {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    background: var(--surface);
  }
  .cat-tab:hover { border-color: var(--accent-bg); }

  .emoji-section { margin-bottom: 26px; }
  .emoji-section[hidden] { display: none; }
  .emoji-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin: 0 0 10px;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
    gap: 6px;
  }
  .emoji-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    font-size: 22px;
    line-height: 1;
    background: var(--surface);
    padding: 0;
    overflow: hidden;
  }
  .emoji-btn:hover { border-color: var(--accent-bg); background: var(--surface-alt); }
  .emoji-check {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-bg);
    color: var(--accent-text);
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.15s ease;
    border-radius: inherit;
  }
  .emoji-btn.copied .emoji-check { opacity: 1; }

  #noResults {
    color: var(--text-muted);
    font-size: 13px;
    padding: 20px 0;
  }

  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-bg);
    color: var(--accent-text);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    display: none;
    z-index: 2000;
    box-shadow: var(--shadow-md);
  }
  #toast.error { background: var(--accent-dark); }
</style>
</head>
<body>

  <p class="sub">Search and copy any emoji.</p>

  <div class="picker-wrap" id="pickerArea">
    <input type="text" id="emojiSearch" class="tool-input" placeholder="Search by name or keyword..." autocomplete="off" aria-label="Search emoji by name or keyword">

    <nav class="category-nav" id="categoryNav" aria-label="Jump to category"></nav>

    <section class="emoji-section" id="recentSection" hidden>
      <h2 class="emoji-section-title">Recently used</h2>
      <div class="emoji-grid" id="recentGrid"></div>
    </section>

    <div id="categorySections"></div>

    <p id="noResults" hidden>No emoji match your search.</p>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function loadRecent() {
      try {
        const arr = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
        return Array.isArray(arr) ? arr.filter(ch => emojiByChar.has(ch)) : [];
      } catch { return []; }
    }
    function saveRecent(list) {
      localStorage.setItem(RECENT_KEY, JSON.stringify(list));
    }

    let recent = loadRecent();

    const searchInput = document.getElementById("emojiSearch");
    const categoryNav = document.getElementById("categoryNav");
    const categorySections = document.getElementById("categorySections");
    const recentSection = document.getElementById("recentSection");
    const recentGrid = document.getElementById("recentGrid");
    const noResults = document.getElementById("noResults");
    const toast = document.getElementById("toast");
    const pickerArea = document.getElementById("pickerArea");

    categoryNav.innerHTML = Object.keys(EMOJI_DATA).map(cat => `
      <button type="button" class="tool-btn cat-tab" data-cat="${cat}">${CATEGORY_LABELS[cat]}</button>
    `).join("");

    categorySections.innerHTML = Object.keys(EMOJI_DATA).map(cat => `
      <section class="emoji-section" id="cat-${cat}">
        <h2 class="emoji-section-title">${CATEGORY_LABELS[cat]}</h2>
        <div class="emoji-grid"></div>
      </section>
    `).join("");

    function emojiButtonHtml(entry) {
      return `
        <button type="button" class="tool-btn emoji-btn" data-emoji="${entry.emoji}" title="${escapeHtml(entry.name)}" aria-label="Copy ${escapeHtml(entry.name)} emoji">
          ${entry.emoji}
          <span class="emoji-check" aria-hidden="true"><i class="fa-solid fa-check"></i></span>
        </button>
      `;
    }

    function matchesQuery(entry, query) {
      if (!query) return true;
      const q = query.toLowerCase();
      return entry.name.toLowerCase().includes(q) || entry.keywords.some(k => k.toLowerCase().includes(q));
    }

    function updateNoResults() {
      const anyVisible = recentSection.hidden === false ||
        Object.keys(EMOJI_DATA).some(cat => !document.getElementById(`cat-${cat}`).hidden);
      noResults.hidden = anyVisible;
    }

    function renderRecent() {
      const query = searchInput.value.trim();
      const entries = recent.map(ch => emojiByChar.get(ch)).filter(Boolean).filter(e => matchesQuery(e, query));
      recentSection.hidden = entries.length === 0;
      recentGrid.innerHTML = entries.map(emojiButtonHtml).join("");
      updateNoResults();
    }

    function renderCategories() {
      const query = searchInput.value.trim();
      Object.keys(EMOJI_DATA).forEach(cat => {
        const entries = EMOJI_DATA[cat].filter(e => matchesQuery(e, query));
        const section = document.getElementById(`cat-${cat}`);
        section.querySelector(".emoji-grid").innerHTML = entries.map(emojiButtonHtml).join("");
        section.hidden = entries.length === 0;
      });
      updateNoResults();
    }

    function showToast(message, isError) {
      toast.textContent = message;
      toast.classList.toggle("error", Boolean(isError));
      toast.style.display = "block";
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => { toast.style.display = "none"; }, 2200);
    }

    function copyEmoji(emoji, btn) {
      if (!navigator.clipboard || !navigator.clipboard.writeText) {
        showToast("Clipboard not available", true);
        return;
      }
      navigator.clipboard.writeText(emoji).then(() => {
        const entry = emojiByChar.get(emoji);
        showToast(entry ? `Copied ${emoji} ${entry.name}` : `Copied ${emoji}`);
        if (btn) {
          btn.classList.add("copied");
          setTimeout(() => btn.classList.remove("copied"), 500);
        }
        recent = [emoji, ...recent.filter(ch => ch !== emoji)].slice(0, RECENT_CAP);
        saveRecent(recent);
        // Delayed so the just-clicked button's checkmark flash (above) has
        // time to actually play before its grid gets rebuilt out from under it.
        setTimeout(renderRecent, 550);
      }).catch(() => showToast("Clipboard blocked", true));
    }

    pickerArea.addEventListener("click", e => {
      const btn = e.target.closest(".emoji-btn");
      if (btn) { copyEmoji(btn.dataset.emoji, btn); return; }
      const tab = e.target.closest(".cat-tab");
      if (tab) {
        const section = document.getElementById(`cat-${tab.dataset.cat}`);
        if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });

    searchInput.addEventListener("input", () => {
      renderRecent();
      renderCategories();
    });

    renderRecent();
    renderCategories();
  </script>
</body>
</html>
