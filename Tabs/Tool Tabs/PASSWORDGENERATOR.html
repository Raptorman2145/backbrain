<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Password Generator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../../code/CSS/shared.css">
<link rel="stylesheet" href="../../code/CSS/tools.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
  body {
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px clamp(16px, 4vw, 48px);
    background: var(--bg);
    color: var(--text);
  }
  h1 { margin-bottom: 4px; }
  p.sub { color: var(--text-muted); margin: 0 0 24px; }

  button:focus-visible, input:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }

  .pw-wrap { max-width: 480px; }

  .pw-output-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .pw-output {
    flex: 1;
    min-width: 0;
    padding: 12px 14px;
    font-size: 17px;
    font-family: 'Consolas', monospace;
    letter-spacing: 0.02em;
    background: var(--surface);
  }
  #copyBtn {
    flex-shrink: 0;
    width: 46px;
    font-size: 16px;
    background: var(--surface);
  }
  #copyBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  .copy-note { min-height: 18px; font-size: 12px; color: var(--accent-bg); margin-bottom: 14px; }

  .strength-row { display: flex; align-items: center; gap: 10px; margin: 0 0 22px; }
  .strength-track {
    flex: 1;
    height: 8px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    background: var(--accent-bg);
    border-radius: 999px;
    transition: width 0.2s ease, opacity 0.2s ease;
  }
  .strength-label { font-size: 13px; font-weight: 700; color: var(--text-muted); min-width: 52px; text-align: right; }

  .length-row { margin-bottom: 20px; }
  .length-row > label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  #lengthValue { color: var(--text); font-weight: 700; }
  .length-controls { display: flex; align-items: center; gap: 12px; }
  #lengthRange { flex: 1; accent-color: var(--accent-bg); }
  #lengthNumber { width: 70px; padding: 8px 9px; font-size: 13px; background: var(--surface); }

  .option-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .option-check {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
  }
  .option-check input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent-bg); cursor: pointer; }

  .option-note { color: var(--accent-bg); font-size: 12px; margin: 6px 0 0; }

  .generate-btn {
    margin-top: 18px;
    padding: 13px 22px;
    width: 100%;
    font-size: 15px;
    font-family: inherit;
    font-weight: 700;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent-bg);
    color: var(--accent-text);
    cursor: pointer;
  }
  .generate-btn:hover { filter: brightness(1.08); }
  .generate-btn:active { transform: scale(0.99); }
</style>
</head>
<body>
  <h1>Password Generator</h1>
  <p class="sub">Generate strong random passwords.</p>

  <div class="pw-wrap">
    <div class="pw-output-row">
      <input type="text" id="pwOutput" class="tool-input pw-output" readonly aria-label="Generated password" placeholder="Click Generate to create a password">
      <button type="button" class="tool-btn" id="copyBtn" aria-label="Copy password to clipboard" disabled><i class="fa-regular fa-copy"></i></button>
    </div>
    <div class="copy-note" id="copyNote" aria-live="polite"></div>

    <div class="strength-row">
      <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
      <span class="strength-label" id="strengthLabel">—</span>
    </div>

    <form id="pwForm">
      <div class="length-row">
        <label for="lengthNumber">Length: <span id="lengthValue">16</span></label>
        <div class="length-controls">
          <input type="range" id="lengthRange" min="6" max="64" value="16">
          <input type="number" id="lengthNumber" class="tool-input" min="6" max="64" value="16">
        </div>
      </div>

      <div class="option-grid">
        <label class="option-check"><input type="checkbox" id="optUpper" checked> Uppercase letters (A-Z)</label>
        <label class="option-check"><input type="checkbox" id="optLower" checked> Lowercase letters (a-z)</label>
        <label class="option-check"><input type="checkbox" id="optNumber" checked> Numbers (0-9)</label>
        <label class="option-check"><input type="checkbox" id="optSymbol" checked> Symbols (!@#$%^&amp;*...)</label>
        <label class="option-check"><input type="checkbox" id="optAmbiguous"> Exclude ambiguous characters (0/O, 1/l/I)</label>
      </div>
      <p class="option-note" id="optionNote" hidden>At least one character type has to stay selected.</p>

      <button type="submit" class="generate-btn">Generate Password</button>
    </form>
  </div>

  <script src="../../code/General%20Code/sidebar.js"></script>
  <script>
    function secureRandomInt(maxExclusive) {
      const maxUint32 = 0xFFFFFFFF;
      const limit = maxUint32 - (maxUint32 % maxExclusive);
      const buf = new Uint32Array(1);
      let x;
      do {
        crypto.getRandomValues(buf);
        x = buf[0];
      } while (x >= limit);
      return x % maxExclusive;
    }

    const CHARSETS = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      number: '0123456789',
      symbol: '!@#$%^&*()_+-=[]{}|;:,.<>?',
    };
    const AMBIGUOUS_RE = /[0O1lI]/g;

    const pwOutputEl = document.getElementById('pwOutput');
    const copyBtn = document.getElementById('copyBtn');
    const copyNoteEl = document.getElementById('copyNote');
    const strengthFillEl = document.getElementById('strengthFill');
    const strengthLabelEl = document.getElementById('strengthLabel');
    const lengthRangeEl = document.getElementById('lengthRange');
    const lengthNumberEl = document.getElementById('lengthNumber');
    const lengthValueEl = document.getElementById('lengthValue');
    const optUpper = document.getElementById('optUpper');
    const optLower = document.getElementById('optLower');
    const optNumber = document.getElementById('optNumber');
    const optSymbol = document.getElementById('optSymbol');
    const optAmbiguous = document.getElementById('optAmbiguous');
    const optionNoteEl = document.getElementById('optionNote');
    const pwForm = document.getElementById('pwForm');

    const checkboxEls = [optUpper, optLower, optNumber, optSymbol];
    let copyNoteTimer = null;
    let optionNoteTimer = null;

    function currentLength() {
      return Math.min(64, Math.max(6, parseInt(lengthNumberEl.value, 10) || 16));
    }

    function setLength(val) {
      const v = Math.min(64, Math.max(6, val));
      lengthRangeEl.value = v;
      lengthNumberEl.value = v;
      lengthValueEl.textContent = v;
    }

    function activeCharsetKeys() {
      const active = [];
      if (optUpper.checked) active.push('upper');
      if (optLower.checked) active.push('lower');
      if (optNumber.checked) active.push('number');
      if (optSymbol.checked) active.push('symbol');
      return active;
    }

    function poolFor(key) {
      let chars = CHARSETS[key];
      if (optAmbiguous.checked) chars = chars.replace(AMBIGUOUS_RE, '');
      return chars;
    }

    function generatePassword(length, activeKeys) {
      const pools = activeKeys.map(poolFor).filter(p => p.length > 0);
      if (pools.length === 0) return '';
      const fullPool = pools.join('');
      const chars = [];
      // Guarantee one char from each selected type first (so a long password can't randomly
      // end up missing an entire selected category), then fill the rest from the combined pool.
      for (const pool of pools) {
        if (chars.length < length) chars.push(pool[secureRandomInt(pool.length)]);
      }
      while (chars.length < length) {
        chars.push(fullPool[secureRandomInt(fullPool.length)]);
      }
      for (let i = chars.length - 1; i > 0; i--) {
        const j = secureRandomInt(i + 1);
        [chars[i], chars[j]] = [chars[j], chars[i]];
      }
      return chars.slice(0, length).join('');
    }

    function computeStrength(length, poolSize) {
      if (poolSize === 0) return { label: '—', level: 0 };
      const bits = length * Math.log2(poolSize);
      if (bits < 40) return { label: 'Weak', level: 1 };
      if (bits < 60) return { label: 'Fair', level: 2 };
      if (bits < 80) return { label: 'Good', level: 3 };
      return { label: 'Strong', level: 4 };
    }

    function renderStrength() {
      const length = currentLength();
      let poolSize = 0;
      activeCharsetKeys().forEach(key => { poolSize += poolFor(key).length; });
      const { label, level } = computeStrength(length, poolSize);
      const pct = [0, 25, 50, 75, 100][level];
      const opacity = [0.3, 0.45, 0.65, 0.85, 1][level];
      strengthFillEl.style.width = pct + '%';
      strengthFillEl.style.opacity = opacity;
      strengthLabelEl.textContent = label;
    }

    const OPTIONS_KEY = 'pwgen_options';
    function saveOptions() {
      try {
        localStorage.setItem(OPTIONS_KEY, JSON.stringify({
          length: currentLength(),
          upper: optUpper.checked,
          lower: optLower.checked,
          number: optNumber.checked,
          symbol: optSymbol.checked,
          ambiguous: optAmbiguous.checked,
        }));
      } catch { /* storage unavailable - options just won't persist */ }
    }
    function loadOptions() {
      try {
        const raw = JSON.parse(localStorage.getItem(OPTIONS_KEY) || 'null');
        if (!raw) return;
        if (typeof raw.length === 'number') setLength(raw.length);
        if (typeof raw.upper === 'boolean') optUpper.checked = raw.upper;
        if (typeof raw.lower === 'boolean') optLower.checked = raw.lower;
        if (typeof raw.number === 'boolean') optNumber.checked = raw.number;
        if (typeof raw.symbol === 'boolean') optSymbol.checked = raw.symbol;
        if (typeof raw.ambiguous === 'boolean') optAmbiguous.checked = raw.ambiguous;
        if (checkboxEls.every(x => !x.checked)) optLower.checked = true;
      } catch { /* corrupt/unavailable storage - defaults already set in markup stay in place */ }
    }

    function generateAndRender() {
      const length = currentLength();
      setLength(length);
      const password = generatePassword(length, activeCharsetKeys());
      pwOutputEl.value = password;
      pwOutputEl.placeholder = password ? '' : 'Select at least one character type.';
      copyBtn.disabled = !password;
      copyNoteEl.textContent = '';
      renderStrength();
      saveOptions();
    }

    lengthRangeEl.addEventListener('input', () => {
      setLength(parseInt(lengthRangeEl.value, 10));
      renderStrength();
    });
    lengthNumberEl.addEventListener('input', () => {
      // Don't clamp on every keystroke - typing "6" then "0" toward 60 would get stuck
      // at 6 if we rewrote the field's value mid-entry. Clamp for real on blur/submit instead.
      const n = parseInt(lengthNumberEl.value, 10);
      if (!isNaN(n)) {
        lengthValueEl.textContent = Math.min(64, Math.max(6, n));
        if (n >= 6 && n <= 64) lengthRangeEl.value = n;
        renderStrength();
      }
    });
    lengthNumberEl.addEventListener('blur', () => { setLength(currentLength()); renderStrength(); });

    checkboxEls.forEach(cb => {
      cb.addEventListener('change', () => {
        if (checkboxEls.every(x => !x.checked)) {
          cb.checked = true;
          optionNoteEl.hidden = false;
          clearTimeout(optionNoteTimer);
          optionNoteTimer = setTimeout(() => { optionNoteEl.hidden = true; }, 2200);
          return;
        }
        renderStrength();
        saveOptions();
      });
    });
    optAmbiguous.addEventListener('change', () => { renderStrength(); saveOptions(); });

    pwForm.addEventListener('submit', e => {
      e.preventDefault();
      generateAndRender();
    });

    copyBtn.addEventListener('click', async () => {
      if (!pwOutputEl.value) return;
      try {
        await navigator.clipboard.writeText(pwOutputEl.value);
        copyNoteEl.textContent = 'Copied!';
      } catch {
        copyNoteEl.textContent = 'Could not copy automatically - select the text and copy it manually.';
      }
      clearTimeout(copyNoteTimer);
      copyNoteTimer = setTimeout(() => { copyNoteEl.textContent = ''; }, 1800);
    });

    loadOptions();
    generateAndRender();
  </script>
</body>
</html>
