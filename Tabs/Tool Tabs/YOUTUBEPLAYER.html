<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading...</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; }
  iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <iframe id="player" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>

  <script>
    // A real, same-origin page (not a blob: URL) so the iframe below always
    // sends a real, consistent referrer/origin to YouTube - blob: documents
    // have a null/opaque origin, which the nocookie embed intermittently
    // rejects as an invalid embedding context (Error 153).
    const params = new URLSearchParams(location.search);
    const id = params.get('v');
    const title = params.get('title');
    if (title) document.title = title;
    if (id) {
      document.getElementById('player').src =
        `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}?autoplay=1&modestbranding=1&rel=0`;
    }
  </script>
</body>
</html>
